<script>
const out=document.getElementById('out'),bar=document.getElementById('bar'),len=document.getElementById('len'),lenVal=document.getElementById('lenVal');
const upper=document.getElementById('upper'),lower=document.getElementById('lower'),num=document.getElementById('num'),sym=document.getElementById('sym');
const sets={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()-_=+[]{};:,.<>?'};
len.oninput=()=>lenVal.textContent=len.value;
function gen(){
  const pools=[];let all='';
  for(const k in sets){if(document.getElementById(k).checked){pools.push(sets[k]);all+=sets[k];}}
  if(!all){out.textContent='请至少选择一种字符';return;}
  const n=parseInt(len.value);const arr=new Uint32Array(n);
  crypto.getRandomValues(arr);
  let res='';
  for(let i=0;i<n;i++) res+=all[arr[i]%all.length];
  // ensure at least one from each selected pool
  let chars=res.split('');
  pools.forEach((p,i)=>{chars[i]=p[arr[i]%p.length];});
  res=chars.join('');
  out.textContent=res;
  const strength=Math.min(100,Math.round(n*4*(pools.length/4)*3));
  bar.style.width=strength+'%';
  bar.style.background=strength>70?'#16a34a':strength>40?'#f59f00':'#e03131';
}
document.getElementById('gen').onclick=gen;
document.getElementById('copy').onclick=()=>{navigator.clipboard.writeText(out.textContent);document.getElementById('copy').textContent='已复制';setTimeout(()=>document.getElementById('copy').textContent='复制',1200);};
